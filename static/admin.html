<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Fashion Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 200: '#fbcfe8', 300: '#f9a8d4', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d', 800: '#9d174d', 900: '#831843' },
                        accent: { 50: '#fff0f5', 100: '#ffe4eb', 200: '#ffc0d9', 300: '#ff97c9', 400: '#ff6eb3', 500: '#ff3b9a', 600: '#db2777', 700: '#b01b5f', 800: '#8d1350', 900: '#660d3d' },
                        dark: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    keyframes: {
                        'fade-in': { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        'slide-in': { '0%': { transform: 'translateX(-30px)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } },
                        'slide-up': { '0%': { transform: 'translateY(40px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        'scale-in': { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                    },
                    animation: {
                        'fade-in': 'fade-in 0.6s ease-out',
                        'slide-in': 'slide-in 0.6s ease-out',
                        'slide-up': 'slide-up 0.6s ease-out',
                        'scale-in': 'scale-in 0.4s ease-out',
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-red-50/30 to-rose-50 text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Navbar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-gradient-to-r from-white/80 to-pink-50/50 backdrop-blur-2xl border-b border-pink-200 shadow-lg shadow-pink-200/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/static/admin.html" class="flex items-center gap-2.5 group">
                    <div class="w-9 h-9 bg-gradient-to-br from-sky-400 to-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-300 group-hover:shadow-sky-400 group-hover:scale-110 transition-all">
                        <i class="fa-solid fa-shield-halved text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-sky-600 to-blue-600 bg-clip-text text-transparent">Admin Panel</span>
                </a>
                <div class="flex items-center gap-2" id="admin-nav">
                    <button onclick="openAddForm()" id="add-btn" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xs font-semibold rounded-xl hover:shadow-lg hover:shadow-pink-400 hover:-translate-y-0.5 transition-all">
                        <i class="fa-solid fa-plus"></i> Tambah
                    </button>
                    <a href="/static/index.html" class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1.5 bg-white text-gray-600 text-xs font-semibold rounded-xl border border-gray-200 hover:border-pink-300 hover:text-pink-600 transition-all">
                        <i class="fa-solid fa-store"></i> Toko
                    </a>
                    <button onclick="logout()" id="logout-btn" class="p-2 text-gray-400 hover:text-red-500 transition-colors hover:scale-110" title="Keluar">
                        <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    </button>
                    <span class="text-xs text-gray-400 hidden sm:block">
                        <span id="admin-name" class="font-semibold text-gray-600">Admin</span>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="relative pt-16 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-sky-50 via-white to-blue-50/40"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black text-gray-900">Manajemen Katalog</h1>
                    <p class="text-sm text-gray-400 mt-1">Kelola produk fashion</p>
                </div>
                <button onclick="openAddForm()" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-gradient-to-r from-pink-500 to-rose-600 text-white text-sm font-bold rounded-xl hover:shadow-lg hover:shadow-pink-400 hover:-translate-y-0.5 transition-all">
                    <i class="fa-solid fa-plus"></i> Tambah Produk
                </button>
            </div>
        </div>
    </header>

    <!-- Product Table -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-8">
        <div class="flex items-center justify-between mb-4">
            <p id="result-count" class="text-sm text-gray-400">Memuat...</p>
            <div class="flex gap-2">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Cari produk..." oninput="debouncedFilter()" class="pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400 transition-all w-48 sm:w-64 placeholder:text-gray-300">
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="flex items-center justify-center py-20">
            <div class="flex flex-col items-center gap-3">
                <div class="w-10 h-10 border-4 border-primary-200 border-t-primary-500 rounded-full animate-spin"></div>
                <p class="text-sm text-gray-400">Memuat data...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <i class="fa-solid fa-shirt text-3xl text-gray-300"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-600">Tidak ada produk</h3>
            <p class="text-sm text-gray-400 mt-1">Tambahkan produk baru</p>
        </div>

        <!-- Product Table -->
        <div id="table-container" class="hidden">
            <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-lg shadow-gray-200/40">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gradient-to-r from-gray-50 to-sky-50 border-b border-gray-100">
                                <th class="text-left px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider">Produk</th>
                                <th class="text-left px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider hidden md:table-cell">Kategori</th>
                                <th class="text-left px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider hidden sm:table-cell">Merk</th>
                                <th class="text-right px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider">Harga</th>
                                <th class="text-center px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider hidden sm:table-cell">Stok</th>
                                <th class="text-center px-4 py-3.5 font-bold text-gray-600 text-xs uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- Detail Modal -->
    <div id="modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto animate-scale-in">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors z-10">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modal-content" class="p-5 sm:p-8 break-words"></div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-gradient-to-br from-sky-50 via-white to-blue-50/40">
        <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm animate-scale-in p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-sky-100 to-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-sky-300/30">
                    <i class="fa-solid fa-shield-halved text-2xl text-sky-600"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-900">Admin Login</h3>
                <p class="text-sm text-gray-400 mt-1">Masuk ke panel admin</p>
            </div>
            <form id="login-form" onsubmit="submitLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" name="username" required placeholder="Username admin" value="admin" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400 transition-all placeholder:text-gray-300">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" name="password" required placeholder="Masukkan password" id="login-password" class="w-full pl-10 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-400 transition-all placeholder:text-gray-300">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-sky-600 transition-colors">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="login-submit-btn" class="w-full py-3.5 bg-gradient-to-r from-sky-500 to-blue-600 text-white font-bold rounded-xl hover:shadow-lg hover:shadow-sky-400/50 hover:-translate-y-0.5 transition-all text-sm flex items-center justify-center gap-2">
                    <span id="login-submit-text">Masuk</span>
                    <span id="login-submit-loading" class="hidden"><i class="fa-solid fa-spinner animate-spin"></i> Memproses...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-[75] bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-medium translate-y-4 opacity-0 invisible transition-all duration-300">
        <i class="fa-solid fa-check-circle text-emerald-400"></i>
        <span id="toast-message">Berhasil</span>
    </div>

    <script src="/static/admin.js"></script>
</body>
</html>
